<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Diploma SBT</title>
</head>
<body>

    <h1>🎓 Academic Diploma SBT</h1>

    <button onclick="connectWallet()">Connect Wallet</button>

    <hr>

    <h2>Issue Diploma (Owner Only)</h2>

    <input id="student" placeholder="Student Address">
    <br><br>

    <input id="name" placeholder="Student Name">
    <br><br>

    <input id="course" placeholder="Course Name">
    <br><br>

    <button onclick="issueDiploma()">Issue Diploma</button>

    <hr>

    <h2>Verify Diploma</h2>

    <input id="verifyId" placeholder="Token ID">
    <button onclick="verifyDiploma()">Verify</button>

    <p id="result"></p>

    <hr>

    <h2>Get Student Diplomas</h2>

    <input id="studentAddr" placeholder="Student Address">
    <button onclick="getStudentDiplomas()">Get Diplomas</button>

    <p id="list"></p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>

        let provider;
        let signer;
        let contract;

        const contractAddress =
            "0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512";

        const abi = [
            "function issueDiploma(address,string,string)",
            "function verifyDiploma(uint256) view returns (bool)",
            "function getStudentDiplomas(address) view returns (uint256[])",
            "function owner() view returns(address)"
        ];

        async function connectWallet() {

            if (!window.ethereum) {
                alert("MetaMask not found!");
                return;
            }

            try {

                await window.ethereum.request({
                    method: "eth_requestAccounts"
                });

                provider =
                    new ethers.providers.Web3Provider(
                        window.ethereum
                    );

                signer = provider.getSigner();

                contract =
                    new ethers.Contract(
                        contractAddress,
                        abi,
                        signer
                    );

                alert("Wallet connected!");

                console.log("Connected");

            } catch (error) {

                console.error(error);

                alert(
                    "Failed to connect wallet"
                );
            }
        }

        async function issueDiploma() {

            if (!contract) {
                alert("Connect wallet first!");
                return;
            }

            try {

                const student =
                    document.getElementById("student").value;

                const name =
                    document.getElementById("name").value;

                const course =
                    document.getElementById("course").value;

                const tx =
                    await contract.issueDiploma(
                        student,
                        name,
                        course
                    );

                await tx.wait();

                alert("Diploma issued!");

            } catch (error) {

                console.error(error);

                alert("Transaction failed");
            }
        }

        async function verifyDiploma() {

            if (!contract) {
                alert("Connect wallet first!");
                return;
            }

            try {

                const id =
                    document.getElementById("verifyId").value;

                const valid =
                    await contract.verifyDiploma(id);

                document.getElementById("result")
                    .innerText =
                    valid
                        ? "✅ Valid diploma"
                        : "❌ Invalid diploma";

            } catch (error) {

                console.error(error);

                alert("Verification failed");
            }
        }

        async function getStudentDiplomas() {

            if (!contract) {
                alert("Connect wallet first!");
                return;
            }

            try {

                const addr =
                    document.getElementById(
                        "studentAddr"
                    ).value;

                const diplomas =
                    await contract.getStudentDiplomas(
                        addr
                    );

                document.getElementById("list")
                    .innerText =
                    "Diplomas: " +
                    diplomas.join(", ");

            } catch (error) {

                console.error(error);

                alert("Failed to load diplomas");
            }
        }

    </script>

</body>
</html>
